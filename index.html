<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProtectID | Privacidad DNI 2025</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <meta name="description" content="Herramienta local para censurar y proteger tu DNI con marcas de agua.">
</head>

<body>
    <div class="background-mesh"></div>

    <main class="app-container">
        <header class="app-header">
            <h1 class="logo">Protect<span class="highlight">ID</span></h1>
            <p class="subtitle">Privacidad Local & Segura</p>
            <div class="privacy-badge">
                <span class="icon">🔒</span>
                <span>Procesado 100% en tu navegador. Tus datos nunca salen de este dispositivo.</span>
            </div>
        </header>

        <section id="upload-section" class="glass-panel upload-zone">
            <div class="upload-content">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" class="upload-icon">
                    <path d="M12 16L12 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M9 11L12 8 15 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                    <path d="M22 15V19C22 20.6569 20.6569 22 19 22H5C3.34315 22 2 20.6569 2 19V15" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" />
                </svg>
                <h2>Arrastra tu DNI aquí</h2>
                <p>o haz clic para seleccionar</p>
                <p class="camera-hint">📷 En móvil puedes usar la cámara</p>
                <input type="file" id="file-input" accept="image/*" capture="environment" hidden>
            </div>
        </section>

        <section id="editor-section" class="editor-container hidden">
            <div class="image-wrapper">
                <canvas id="dni-canvas"></canvas>
                <div class="canvas-instruction">Arrastra para censurar • Clic para editar</div>
            </div>

            <div class="glass-panel controls-panel">
                <div class="control-group">
                    <button id="btn-bw" class="tool-btn">
                        <span class="icon">◐</span> Blanco y Negro
                    </button>
                    <button id="btn-clear" class="tool-btn secondary">
                        <span class="icon">↺</span> Limpiar Todo
                    </button>
                </div>

                <div class="control-group watermark-group">
                    <input type="text" id="watermark-text" placeholder="Texto marca de agua..." class="modern-input">
                    <div class="color-palette">
                        <div class="color-option" data-color="#ffffff" style="background-color: #ffffff;"
                            title="Blanco"></div>
                        <div class="color-option" data-color="#a0a0b0" style="background-color: #a0a0b0;" title="Gris">
                        </div>
                        <div class="color-option active" data-color="#000000"
                            style="background-color: #000000; border: 1px solid #333;" title="Negro"></div>
                        <div class="color-option" data-color="#ff4757" style="background-color: #ff4757;" title="Rojo">
                        </div>
                        <div class="color-option" data-color="#2ed573" style="background-color: #2ed573;" title="Verde">
                        </div>
                    </div>
                    <button id="btn-watermark" class="tool-btn primary">
                        <span class="icon">🌊</span> <span class="btn-text">APLICAR MARCA DE AGUA</span>
                    </button>
                </div>

                <div class="sliders-vertical-container">
                    <div class="slider-row">
                        <label for="wave-slider">Amplitud</label>
                        <input type="range" id="wave-slider" min="0" max="60" value="20" class="modern-slider">
                    </div>
                    <div class="slider-row">
                        <label for="angle-slider">Ángulo</label>
                        <input type="range" id="angle-slider" min="-90" max="90" value="-45" class="modern-slider">
                    </div>
                    <div class="slider-row">
                        <label for="size-slider">Tamaño</label>
                        <input type="range" id="size-slider" min="10" max="80" value="24" class="modern-slider">
                    </div>
                    <div class="slider-row">
                        <label for="lineheight-slider">Espaciado</label>
                        <!-- Range 0 to 30 as requested -->
                        <input type="range" id="lineheight-slider" min="0" max="30" value="10" class="modern-slider">
                    </div>
                    <div class="slider-row">
                        <label for="opacity-slider">Opacidad</label>
                        <input type="range" id="opacity-slider" min="5" max="100" value="15" class="modern-slider">
                    </div>
                </div>

                <div class="action-group">
                    <button id="btn-download" class="action-btn">
                        Guardar Imagen
                    </button>
                    <button id="btn-new" class="action-btn text-only">
                        Nueva Imagen
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
